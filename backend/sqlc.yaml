          - column: "usage_bindings.session_id"
            go_type:
              import: "github.com/aoagents/agent-orchestrator/backend/internal/domain"
              type: "SessionID"
          - column: "usage_bindings.harness"
            go_type:
              import: "github.com/aoagents/agent-orchestrator/backend/internal/domain"
              type: "AgentHarness"
          - column: "usage_bindings.state"
            go_type:
              import: "github.com/aoagents/agent-orchestrator/backend/internal/domain"
              type: "UsageBindingState"
          - column: "usage_sources.kind"
            go_type:
              import: "github.com/aoagents/agent-orchestrator/backend/internal/domain"
              type: "UsageSourceKind"
          - column: "usage_sources.state"
            go_type:
              import: "github.com/aoagents/agent-orchestrator/backend/internal/domain"
