              type: "SessionID"
          - column: "model_usage_events.harness"
            go_type:
              import: "github.com/aoagents/agent-orchestrator/backend/internal/domain"
              type: "AgentHarness"
          - column: "model_usage_events.cost_basis"
            go_type:
              import: "github.com/aoagents/agent-orchestrator/backend/internal/domain"
              type: "CostBasis"
          - column: "model_usage_events.token_confidence"
            go_type:
              import: "github.com/aoagents/agent-orchestrator/backend/internal/domain"
              type: "TokenConfidence"
          - column: "model_usage_events.cost_confidence"
            go_type:
              import: "github.com/aoagents/agent-orchestrator/backend/internal/domain"
              type: "CostConfidence"
          - column: "review.session_id"
            go_type:
              import: "github.com/aoagents/agent-orchestrator/backend/internal/domain"
              type: "SessionID"
          - column: "review.project_id"
            go_type:
              import: "github.com/aoagents/agent-orchestrator/backend/internal/domain"
              type: "ProjectID"
          - column: "review.harness"
            go_type:
              import: "github.com/aoagents/agent-orchestrator/backend/internal/domain"
              type: "ReviewerHarness"
          - column: "review_run.session_id"
            go_type:
              import: "github.com/aoagents/agent-orchestrator/backend/internal/domain"
              type: "SessionID"
          - column: "review_run.harness"
            go_type:
              import: "github.com/aoagents/agent-orchestrator/backend/internal/domain"
              type: "ReviewerHarness"
          - column: "review_run.status"
            go_type:
              import: "github.com/aoagents/agent-orchestrator/backend/internal/domain"
