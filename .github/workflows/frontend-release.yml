name: Desktop release

# Builds the Electron desktop app via electron-forge, UNSIGNED, on desktop-v*
# tag pushes and manual dispatch. In-build signing/notarization, GitHub Release
# creation, stable asset-alias uploads, and updater feed generation are produced
# by a separate, access-restricted release pipeline; this workflow only proves
# every platform still builds from this repo.
#
# Each target OS builds on its own runner so the bundled `ao` daemon is compiled
# natively for that platform. build-daemon.mjs keys the binary off the build
# host's platform, so cross-OS packaging (e.g. building the Windows installer on
# macOS) would ship a non-Windows binary named `ao` and the app could not launch
# the daemon (issues #235/#256). The per-OS matrix keeps host == target, and the
# Linux daemon is built on the Linux runner (AgentWrapper/agent-orchestrator#2191).

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # The daemon is compiled by build-daemon.mjs during prepackage/premake, so
      # the Go toolchain must be present and pinned on every runner.
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - run: npm ci
      - name: Build (unsigned)
        shell: bash
        run: npm run make
        env:
          # Baked into app-update.yml at build time (forge.config.ts prePackage)
          # so the packaged app knows which repo electron-updater pulls from.
          AO_RELEASE_REPO: ${{ github.repository }}

  # Dedicated Intel (darwin-x64) build leg. Kept a separate job (not in the
  # release matrix) because only a macOS host can build the x64 installer.
  # Runner is macos-15-intel: macos-13 is deprecated/has no capacity (multi-hour
  # queues), so this leg uses the supported Intel x64 image.
  release-intel:
    runs-on: macos-15-intel
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - run: npm ci
      - name: Build (unsigned)
        shell: bash
        run: npm run make
        env:
          AO_RELEASE_REPO: ${{ github.repository }}
