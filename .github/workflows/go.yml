name: Go

on:
  push:
    branches: [main]
  merge_group:
  pull_request:

permissions:
  contents: read

jobs:
  migration-version-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: github.event_name == 'pull_request'
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/checkout@v4
        if: github.event_name != 'pull_request'
        with:
          fetch-depth: 0

      - name: Check migration versions
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags origin "${{ github.base_ref }}"
            scripts/check-migration-versions.sh --require-current-base "origin/${{ github.base_ref }}"
          else
            scripts/check-migration-versions.sh
          fi

  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Read the version from go.mod so CI can't drift from the module
          # (it previously pinned 1.22 while go.mod declared 1.25).
          go-version-file: backend/go.mod
          cache: false

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Check migration versions
        working-directory: .
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags origin "${{ github.base_ref }}"
            scripts/check-migration-versions.sh "origin/${{ github.base_ref }}"
          else
            scripts/check-migration-versions.sh
          fi

      - name: Build
        run: go build ./...

      - name: Boot daemon smoke
        run: |
          set -euo pipefail
          binary="$(mktemp)"
          data_dir="$(mktemp -d)"
          run_file="$(mktemp)"
          rm -f "$run_file"
          log_file="$(mktemp)"
          port="$(python3 - <<'PY'
          import socket
          s = socket.socket()
          s.bind(("127.0.0.1", 0))
          print(s.getsockname()[1])
          s.close()
          PY
          )"

          cleanup() {
            if [ -n "${pid:-}" ] && kill -0 "$pid" 2>/dev/null; then
              kill "$pid" 2>/dev/null || true
              wait "$pid" 2>/dev/null || true
            fi
            rm -rf "$binary" "$data_dir" "$run_file" "$log_file"
          }
          trap cleanup EXIT

          go build -o "$binary" ./cmd/ao
          AO_DATA_DIR="$data_dir" \
          AO_RUN_FILE="$run_file" \
            AO_PORT="$port" \
            AO_AGENT_HEALTH_INTERVAL=0 \
            AO_METRICS_INTERVAL=0 \
            "$binary" daemon >"$log_file" 2>&1 &
          pid=$!

          for _ in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:$port/readyz" >/dev/null 2>&1; then
              curl -fsS "http://127.0.0.1:$port/api/v1/version" >/dev/null
              exit 0
            fi
            if ! kill -0 "$pid" 2>/dev/null; then
              echo "daemon exited before ready" >&2
              cat "$log_file" >&2
              exit 1
            fi
            sleep 0.5
          done

          echo "daemon did not become ready" >&2
          cat "$log_file" >&2
          exit 1

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

  boot-daemon-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: false

      - name: Build and boot daemon
        run: |
          set -euo pipefail
          binary="$(mktemp)"
          data_dir="$(mktemp -d)"
          run_file="$(mktemp)"
          rm -f "$run_file"
          log_file="$(mktemp)"
          port="$(python3 - <<'PY'
          import socket
          s = socket.socket()
          s.bind(("127.0.0.1", 0))
          print(s.getsockname()[1])
          s.close()
          PY
          )"

          cleanup() {
            if [ -n "${pid:-}" ] && kill -0 "$pid" 2>/dev/null; then
              kill "$pid" 2>/dev/null || true
              wait "$pid" 2>/dev/null || true
            fi
            rm -rf "$binary" "$data_dir" "$run_file" "$log_file"
          }
          trap cleanup EXIT

          go build -o "$binary" ./cmd/ao
          AO_DATA_DIR="$data_dir" \
          AO_RUN_FILE="$run_file" \
            AO_PORT="$port" \
            AO_AGENT_HEALTH_INTERVAL=0 \
            AO_METRICS_INTERVAL=0 \
            "$binary" daemon >"$log_file" 2>&1 &
          pid=$!

          for _ in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:$port/readyz" >/dev/null 2>&1; then
              curl -fsS "http://127.0.0.1:$port/api/v1/version" >/dev/null
              exit 0
            fi
            if ! kill -0 "$pid" 2>/dev/null; then
              echo "daemon exited before ready" >&2
              cat "$log_file" >&2
              exit 1
            fi
            sleep 0.5
          done

          echo "daemon did not become ready" >&2
          cat "$log_file" >&2
          exit 1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: false

      - name: golangci-lint
        # v8 of the action drives golangci-lint v2 (the schema this config uses);
        # the v6 action speaks v1 CLI flags and errors against a v2 binary.
        uses: golangci/golangci-lint-action@v8
        with:
          # Pinned for reproducibility: bump intentionally rather than letting an
          # upstream release change CI. Must be built with Go >= the module's
          # (go.mod is 1.25); v2.12.2 is built with go1.25 — older v2 tags
          # (e.g. v2.1.x) are built with go1.24 and refuse to analyze 1.25 code.
          version: v2.12.2
          working-directory: backend
          # Blocking on the full ruleset: the tree is clean at zero findings, so
          # any new issue fails CI rather than being grandfathered.

  api-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: false

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Regenerate API spec and TS types
        run: npm run api

      # openapi.yaml drift is already caught by TestBuild_MatchesEmbedded in
      # the build-test job (go test -race ./...). Only schema.ts needs checking here.
      - name: Check for schema.ts drift
        run: git diff --exit-code -- frontend/src/api/schema.ts
