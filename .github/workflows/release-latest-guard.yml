name: Release latest guard

# Guard against accidental non-stable GitHub releases taking over
# /releases/latest and breaking electron-updater's stable channel.
#
# ao carries no stable GitHub release (it deploys from source via ops/deploy.sh to
# a local self-hosted daemon, with no updater feed), so the guard SKIPS with a
# neutral notice when no stable latest release exists — see
# ops/release-latest-guard.sh. The logic lives in that script, not inline here, so
# it is covered by ops/release-latest-guard.test.mjs.
on:
  release:
    types: [published, edited, released]
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

jobs:
  latest-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Verify latest stable release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: bash ops/release-latest-guard.sh
