name: Canary

on:
  schedule:
    - cron: "0 18 * * 5,6,0,1,2"
  workflow_dispatch:

concurrency:
  group: canary
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  canary:
    name: Canary build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: node scripts/check-publishable-deps.mjs
