# .github/workflows/frontend-nightly.yml
name: Desktop nightly

# Nightly desktop build on main, manual dispatch only (a separate,
# access-restricted release pipeline drives scheduled nightly releases now).
# Computes X.Y.(Z+1)-nightly.<UTC-ts>+<sha> from the latest stable desktop tag,
# stamps it, and builds all platforms UNSIGNED. Prerelease creation and updater
# feed generation are produced by that pipeline. Skips when there are no new
# commits since the last nightly.
on:
  workflow_dispatch:

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need tags + history for the no-new-commits check
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - id: check
        shell: bash
        run: |
          # Skip if HEAD is already covered by the most recent nightly tag.
          last_nightly="$(git tag --list 'v*-nightly.*' --sort=-creatordate | head -n1)"
          if [ -n "$last_nightly" ] && [ "$(git rev-list -n1 "$last_nightly")" = "$(git rev-parse HEAD)" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi
      - id: version
        if: steps.check.outputs.should_build == 'true'
        shell: bash
        run: |
          latest_stable="$(git tag --list 'desktop-v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | grep -v nightly | head -n1)"
          latest_stable="${latest_stable:-desktop-v0.0.0}"
          short_sha="$(git rev-parse --short HEAD)"
          version="$(node frontend/scripts/nightly-version.mjs "$latest_stable" "$short_sha")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  release:
    needs: guard
    if: needs.guard.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - run: npm ci
      - name: Stamp nightly version
        shell: bash
        env:
          NIGHTLY_VERSION: ${{ needs.guard.outputs.version }}
        run: |
          node -e "const v=process.env.NIGHTLY_VERSION.split('+')[0]; const fs=require('fs'); const p=require('./package.json'); p.version=v; fs.writeFileSync('./package.json', JSON.stringify(p,null,'\t')+'\n');"
      - name: Build (unsigned)
        shell: bash
        run: npm run make
        env:
          # Baked into app-update.yml at build time (forge.config.ts prePackage)
          # so the packaged app knows which repo electron-updater pulls from.
          AO_RELEASE_REPO: ${{ github.repository }}

  # Dedicated Intel (darwin-x64) nightly build leg. Kept separate from the
  # release matrix (only a macOS host can build the x64 installer). Mirrors the
  # release job's macOS steps exactly. Runner is macos-15-intel (macos-13
  # deprecated/no capacity; see the desktop release workflow).
  release-intel:
    needs: guard
    if: needs.guard.outputs.should_build == 'true'
    runs-on: macos-15-intel
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - run: npm ci
      - name: Stamp nightly version
        shell: bash
        env:
          NIGHTLY_VERSION: ${{ needs.guard.outputs.version }}
        run: |
          node -e "const v=process.env.NIGHTLY_VERSION.split('+')[0]; const fs=require('fs'); const p=require('./package.json'); p.version=v; fs.writeFileSync('./package.json', JSON.stringify(p,null,'\t')+'\n');"
      - name: Build (unsigned)
        shell: bash
        run: npm run make
        env:
          AO_RELEASE_REPO: ${{ github.repository }}
