name: Bug Report
description: Report a bug to help us improve Agent Orchestrator
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.
        Make sure to search existing issues first to avoid duplicates.
  
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
    validations:
      required: true
  
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true
  
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened.
    validations:
      required: true
  
  - type: input
    id: version
    attributes:
      label: Agent Orchestrator version
      description: Run `ao version` or check the desktop app About page.
    validations:
      required: true
  
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS (Apple silicon)
        - macOS (Intel)
        - Windows
        - Linux
    validations:
      required: true
  
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output. Use code blocks.
      render: shell
  
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, screenshots, or configuration details.
