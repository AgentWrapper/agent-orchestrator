# XcodeGen spec for the standalone AO watchOS POC app.
#
# This project is intentionally SEPARATE from the Expo-generated `../ios` project
# (which is gitignored and regenerated by `expo prebuild`). Keeping the watch app
# here means it is tracked in git and Expo never touches it.
#
# Regenerate the .xcodeproj after editing this file:
#   cd packages/mobile/watch && xcodegen generate
# (the generated AOWatch.xcodeproj is also committed, so xcodegen is only needed
# if you change this spec.)
name: AOWatch
options:
  createIntermediateGroups: true
  bundleIdPrefix: com.aoagents
  deploymentTarget:
    watchOS: "10.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Personal-team ID from the local Apple Development identity. Team IDs are
    # not secret. Change this to your own team if you build under a different
    # Apple ID (Xcode → Signing & Capabilities → Team).
    DEVELOPMENT_TEAM: L9RSS75TZ8
targets:
  AOWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: AOWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aoagents.aowatch
        PRODUCT_NAME: AO
        INFOPLIST_FILE: AOWatch/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "4"
    scheme:
      testTargets: []
